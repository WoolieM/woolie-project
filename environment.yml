name: woolie-platform-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - pip
  - pytest
  - pytest-mock # Essential for mocking API calls in tests
  - python-dotenv
  - pandas
  - pyarrow # Required for efficient Parquet/GCS operations
  - sqlmodel
  - ipykernel
  - terraform
  - google-cloud-storage
  - google-cloud-bigquery
  - google-cloud-pubsub #Streaming Simulator
  - google-cloud-sdk
  - dbt-bigquery
  - dbt-core
  - pytest-asyncio # For testing async code in FastAPI
  - pip:
    - fastapi[standard]
    - httpx # For modern, async API calls (CoinGecko/Fuel)
    - tenacity # For retry logic and circuit breakers
    - dbt-databricks # To allow dbt to run transforms in Databricks
    - databricks-sdk # For Databricks Asset Bundle (DAB) auth