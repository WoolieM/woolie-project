name: My First Pipeline

on:
  push:
    # This will trigger on pushes to 'main' AND any 'feature' branch
    branches: 
      - main
      - 'feature/**'
  
  # Optional: Trigger on Pull Requests to these branches
  pull_request:
    branches:
      - main
      - 'feature/*'

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a greeting
        run: |
          echo "Hello World!"
          echo "Current branch is: ${{ github.ref_name }}"