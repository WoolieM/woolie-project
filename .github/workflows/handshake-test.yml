name: Cloud Handshake Test Databricks and GCP

on:
  push:
    branches:
      - main
      - 'feature/**'

permissions:
  contents: read
  id-token: write # CRITICAL: This allows GitHub to request the OIDC token from GCP

jobs:
  gcp-handshake:
    name: Test GCP Connection
    runs-on: ubuntu-latest
    # This environment target pulls the specific GCP_WIF_SERVICE_ACCOUNT for 'dev'
    environment: dev 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          # These come from Terraform-managed GitHub variables
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: 'Verify Identity & Project Access'
        run: |
          echo "--- Checking Identity ---"
          gcloud auth list
          
          echo "--- Checking Project Access ---"
          # This proves the SA actually has permissions inside the project
          gcloud config set project ${{ vars.GCP_PROJECT_ID }}
          gcloud storage buckets list --limit=1
          
          echo "Handshake Successful for Environment: dev"

  databricks-handshake:
    name: Test Databricks Connection
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Authenticate to GCP and request an ID Token for Databricks
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Verify Databricks Connection
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_AUTH_TYPE: google-credentials

        run: |
          echo "--- Checking Databricks Identity ---"
          databricks current-user me
          echo "Handshake Successful using Tokenless Identity!"