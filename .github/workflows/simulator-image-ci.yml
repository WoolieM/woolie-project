name: Build & Register Simulator

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'app/simulation/**'
      - 'Dockerfile'
      - 'requirements_ingest.txt'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write


env:
  IMAGE_NAME: bitcoin-ingest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'test' || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Authenticate to GCP using WIF
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          token_format: 'access_token'

      # 2. Configure Docker Auth
      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: ${{ steps.auth.outputs.access_token }}

      # 3. Build and Push
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # All these now pull dynamically from your Terraform variables
          tags: |
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ vars.ENV }}