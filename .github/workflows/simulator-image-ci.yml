name: Build & Register Simulator

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'app/simulation/**'
      - 'Dockerfile'
      - 'requirements_ingest.txt'
      - 'tests/unit/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write


env:
  IMAGE_NAME: bitcoin-ingest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'test' || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_ingest.txt
          pip install pytest pytest-asyncio respx pytest-mock

      - name: Run Unit Tests
        run: |
          export ENV=dev
          pytest tests/unit/

      # 1. Authenticate to GCP using WIF
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          token_format: 'access_token'

      # 2. Configure Docker Auth
      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: ${{ steps.auth.outputs.access_token }}

      # 3. Build and Push
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # All these now pull dynamically from your Terraform variables
          tags: |
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ vars.ENV }}

  # CD
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push] 
    environment: test
    steps:
      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs deploy woolie-bitcoin-ingest-${{ vars.ENV }} \
            --image ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --service-account "bitcoin-ingest-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-secrets "COINGECKO_API_KEY=coingecko-api-key:latest" \
            --set-env-vars "ENV=${{ vars.ENV }},GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},GCP_PUB_SUB_TOPIC=${{ vars.GCP_PUB_SUB_TOPIC }}"