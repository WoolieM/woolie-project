bundle:
  name: woolie-data-platform
  # databricks_cli_version: ">= 0.287.0"
  engine: direct

variables:
  catalog_name:
    description: "The default catalog for the current deployment target"
  dbt_warehouse_id:
      description: "The ID of the SQL Warehouse managed by Terraform"

include:
  - resources/infrastructure/catalogs.yml
  - resources/jobs/streaming_jobs.yml
  - resources/jobs/dbt_jobs.yml


workspace:
  # Free Edition 
  # host: https://dbc-df535374-cdf8.cloud.databricks.com
  # GCP Databricks
  host: https://8259557353875275.5.gcp.databricks.com
targets:
  dev:
    default: true
    variables:
      catalog_name: dev
      dbt_warehouse_id: "e81ba8f63bd36643"
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}

  test:
    mode: production
    variables:
      catalog_name: test
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}

  prd:
    mode: production
    variables:
      catalog_name: prd
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}